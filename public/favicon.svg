<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .blue { fill: #6694BF; }
      .teal {
        fill: #16A8B5;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 12px;
      }
      .brand {
        fill: #6694BF;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 120px;
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- Transparent background -->

  <!-- Book Icon -->
  <g transform="translate(40,35)">
    <!-- Left page -->
    <path class="blue"
      d="M20,20
         C80,20 120,20 140,40
         L140,200
         C110,190 70,188 20,190
         Z"/>

    <!-- Right page -->
    <path class="blue"
      d="M160,40
         C180,20 220,20 280,20
         L280,190
         C230,188 190,190 160,200
         Z"/>

    <!-- Outer lines -->
    <path d="M0 40 L0 220 L90 220 C120 220 140 230 150 240"
          fill="none" stroke="#6694BF" stroke-width="8"/>

    <path d="M300 40 L300 220 L210 220 C180 220 160 230 150 240"
          fill="none" stroke="#6694BF" stroke-width="8"/>
  </g>

  <!-- Brand Name -->
  <text x="380" y="150" class="brand">IncluRead</text>

  <!-- Tagline -->
  <text x="390" y="230" class="teal">ACCESSIBLE READING</text>
</svg>